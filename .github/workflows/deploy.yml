name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            block-puzzle/package-lock.json
            hungry-loong/package-lock.json
            brick-breaker/package-lock.json

      # ── Block Puzzle ─────────────────────────────────────────────────────────
      - name: Install block-puzzle dependencies
        working-directory: block-puzzle
        run: npm ci

      - name: Build block-puzzle
        working-directory: block-puzzle
        run: npm run build

      # ── Hungry Loong ─────────────────────────────────────────────────────────
      - name: Install hungry-loong dependencies
        working-directory: hungry-loong
        run: npm ci

      - name: Build hungry-loong
        working-directory: hungry-loong
        run: npm run build

      # ── Brick Breaker ────────────────────────────────────────────────────────
      - name: Install brick-breaker dependencies
        working-directory: brick-breaker
        run: npm ci

      - name: Build brick-breaker
        working-directory: brick-breaker
        run: npm run build

      # ── Assemble deploy directory ────────────────────────────────────────────
      # 目录结构：
      #   deploy/index.html         → 平台首页
      #   deploy/block-puzzle/      → 方块消除
      #   deploy/hungry-loong/      → 贪吃的小龙
      #   deploy/brick-breaker/     → 敲砖英雄
      - name: Assemble deploy directory
        run: |
          mkdir -p deploy/block-puzzle deploy/hungry-loong deploy/brick-breaker
          cp index.html deploy/index.html
          cp -r block-puzzle/dist/.  deploy/block-puzzle/
          cp -r hungry-loong/dist/.  deploy/hungry-loong/
          cp -r brick-breaker/dist/. deploy/brick-breaker/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: deploy
          commit_message: 'deploy: ${{ github.event.head_commit.message }}'
