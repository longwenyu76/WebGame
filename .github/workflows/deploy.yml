name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            tetris/package-lock.json
            snake/package-lock.json

      # ── Tetris ──────────────────────────────────────────────────────────────
      - name: Install tetris dependencies
        working-directory: tetris
        run: npm ci

      - name: Build tetris
        working-directory: tetris
        run: npm run build

      # ── Snake ───────────────────────────────────────────────────────────────
      - name: Install snake dependencies
        working-directory: snake
        run: npm ci

      - name: Build snake
        working-directory: snake
        run: npm run build

      # ── Assemble deploy directory ────────────────────────────────────────────
      # 目录结构：
      #   deploy/index.html    → 平台首页
      #   deploy/tetris/       → 俄罗斯方块
      #   deploy/snake/        → 贪吃蛇
      - name: Assemble deploy directory
        run: |
          mkdir -p deploy/tetris deploy/snake
          cp index.html deploy/index.html
          cp -r tetris/dist/. deploy/tetris/
          cp -r snake/dist/.  deploy/snake/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: deploy
          commit_message: 'deploy: ${{ github.event.head_commit.message }}'
